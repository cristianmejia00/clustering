# ==============================================================================
# Analysis Configuration
# ==============================================================================
# Edit this file, then run:  source("a02_components.R")  (step 1)
#                             source("a03_clustering.R")  (step 2)
#                             source("a04_thresholding.R") (step 3)
#                             source("a05_reports.R")     (step 4)
#
# This single file replaces the old workflow of:
#   1. Editing _2_settings_analysis.R  (R code)
#   2. Running it to generate a JSON directive
#   3. Pasting the JSON filename into _3_entry_analysis.R
#
# A JSON snapshot is still archived automatically for reproducibility.
# ==============================================================================

metadata:
  bibliometrics_directory: "/Users/cristian/Library/CloudStorage/GoogleDrive-cristianmejia00@gmail.com/My Drive/Bibliometrics_Drive"
  project_folder: "Q346_hydrogen_d3"
  filtered_folder: "f01"
  analysis_id: "a01_cn__f01_dc__c01_lv_v1"


# ==============================================================================
# General Parameters
# ==============================================================================
params:
  recursive_level: 1                    # 0 = clusters only, 1+ = subclusters
  dataset_source: "wos"                 # wos | derwent | factiva
  unit_of_analysis: "cluster"           # cluster | topic | facet | firm | country | etc.
  type_of_analysis: "citation_network"  # citation_network | topic_model | both
  seed: 100                             # For reproducibility


# ==============================================================================
# Citation Network Options
# ==============================================================================
# Used when type_of_analysis is "citation_network" or "both".
# Ignored otherwise — no need to remove this section.
citation_network:
  using_mission_pairs_from_fukan: false
  using_initial_column_C_from_fukan: false
  network_type: "direct_citation"

  # Component selection — which connected component(s) to analyze
  component:
    strategy: "top"                     # all | top | component | min_vertices
    value: 1

  # Clustering algorithm
  clustering:
    algorithm: "louvain"                # louvain | newman | infomap

  # Thresholding — controls recursive clustering and small-cluster aggregation
  thresholding:
    threshold: 0.90                     # Proportion (<1) or exact cluster count (1+)
    max_clusters: 1000
    scope: "all"                        # all | cl99 | cl_99
    size_limit: 270                     # Subcluster only if cluster has >= this many articles
    size_lower_limit: 30                # Include clusters with >= this many articles
    remove_zero: false                  # Remove "-0" suffix from labels (may conflict with Excel)


# ==============================================================================
# Topic Model Options
# ==============================================================================
# Used when type_of_analysis is "topic_model" or "both".
# Ignored otherwise.
topic_model:
  embeds_folder: "e01"
  year_column: "PY"
  n_topics: 0                           # 0 = auto-detect via HDBScan
  min_topic_size: 10


# ==============================================================================
# Add-ons
# ==============================================================================
addons:
  include_orphans: "NO"                 # NO | 99 | 999
  sentiment_analysis: false


# ==============================================================================
# LLM Integration
# ==============================================================================
llm:
  theme: "Hydrogen Economy"
  description: "a proposed energy system that uses hydrogen as a clean, versatile fuel source to replace fossil fuels, producing only water vapor upon combustion"
  compute:
    - old_paper_summaries
    - representative_docs_summaries
    - cluster_title
    - cluster_description
    - cluster_enhanced_description


# ==============================================================================
# Reporting
# ==============================================================================
reporting:
  most_recent_year: 2026
  top_documents: 0                      # 0 = ALL
  top_items: 20                         # 0 = ALL
  text_columns: [TI, AB]

  article_report_columns:
    - X_C
    - cluster_code
    - AU
    - PY
    - DI
    - TI
    - AB
    - Z9
    - X_E
    - DE
    - SO
    - WC
    - Countries
    - UT
    - sentiment
    - sentiment_factor


  categorical_long_reports:
    - AU
    - WC
    - SO
    - Countries
    - Institutions
    - DE
    - sentiment_factor
    - ID


  categorical_simple_wide_reports: [PY, sentiment_factor]
  categorical_multi_wide_reports: [WC, Countries, Institutions]
  numerical_reports: [PY, Z9, sentiment, score]

  # Column display labels — chosen automatically based on params.dataset_source.
  # Only the section matching your dataset_source is used.
